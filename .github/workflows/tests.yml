name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  fast-suite:
    name: Fast suite (master_solver, exporter, ingest, hypothesis)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: scheduler

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fast test suite
        run: |
          # Excludes slow regression (golden snapshots — indicator only per
          # 2026-04-26 decision). Hypothesis property tests run with
          # max_examples=8 from the pre-loaded "ci" profile.
          python -m pytest tests/ -m "not slow" -q --tb=short

      - name: Standalone bundle verifier (sanity check)
        if: always()
        run: |
          # Re-run on the committed v4 bundle to catch any verifier drift.
          if [ -f data/_client_bundle_v4/verify_bundle.py ]; then
            python data/_client_bundle_v4/verify_bundle.py data/_client_bundle_v4
          fi
